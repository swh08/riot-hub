name: Docker Images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_name: riot-hub-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_name: riot-hub-frontend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          namespace="${{ vars.DOCKERHUB_NAMESPACE }}"
          if [ -z "$namespace" ]; then
            namespace="${{ secrets.DOCKERHUB_USERNAME }}"
          fi
          if [ -z "$namespace" ]; then
            namespace="local"
          fi
          echo "value=${{ env.REGISTRY }}/${namespace}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.value }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and optionally push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ github.event_name == 'pull_request' && format('{0}:pr-{1}', steps.image.outputs.value, github.event.pull_request.number) || steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
