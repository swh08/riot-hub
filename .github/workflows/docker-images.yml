name: Docker Images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.filter.outputs.should_build }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect build-relevant changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ "$base" =~ ^0+$ ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(git diff --name-only "$base" "$head")"
          if [ -z "$files" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          should_build=false
          while IFS= read -r file; do
            case "$file" in
              *.md|*.mdx|docs/*|LICENSE|LICENSE.*)
                ;;
              *)
                should_build=true
                break
                ;;
            esac
          done <<< "$files"

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"

  build-check:
    if: github.event_name == 'pull_request' && needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_name: riot-hub-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_name: riot-hub-frontend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: local/${{ matrix.image_name }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  prepare-release:
    if: github.event_name != 'pull_request' && needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version tag
        id: version
        shell: bash
        run: |
          git fetch --tags --force
          latest_tag="$(git tag -l 'v*' --sort=-version:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "value=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push version tag
        env:
          VERSION_TAG: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Tag $VERSION_TAG already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION_TAG"
          git push origin "$VERSION_TAG"

  build-and-push:
    if: github.event_name != 'pull_request' && needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    needs:
      - changes
      - prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_name: riot-hub-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_name: riot-hub-frontend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          namespace="${{ vars.DOCKERHUB_NAMESPACE }}"
          if [ -z "$namespace" ]; then
            namespace="${{ secrets.DOCKERHUB_USERNAME }}"
          fi
          if [ -z "$namespace" ]; then
            namespace="local"
          fi
          echo "value=${{ env.REGISTRY }}/${namespace}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.value }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare-release.outputs.version }}

      - name: Build and optionally push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
